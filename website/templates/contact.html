<section id="contact" class="contact-section py-5">
    <div class="container">
        <h2>Contact</h2>
        <p class="lead">Donec ullamcorper nulla non metus auctor fringilla. Vestibulum id ligula porta felis euismod
            semper. Praesent commodo cursus magna, vel scelerisque nisl consectetur. Fusce dapibus, tellus ac cursus
            commodo.</p>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="bg-light rounded p-4 mt-4">
                    <form novalidate>
                        <div class="row mb-3 align-items-center">
                            <label for="contact-email" class="col-sm-2 col-form-label">Your E-mail</label>
                            <div class="col-sm-10">
                                <input type="email" class="form-control" id="contact-email" name="email"
                                    placeholder="Your email" required>
                            </div>
                        </div>
                        <div class="row mb-3 align-items-start">
                            <label for="contact-message" class="col-sm-2 col-form-label">Your message</label>
                            <div class="col-sm-10">
                                <textarea class="form-control" id="contact-message" name="message" rows="5"
                                    placeholder="Please enter your message here..." required></textarea>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-10 offset-sm-2 text-end">
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
